<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Коннект?</title>
  <style>
    :root {
      color-scheme: dark;
      --coral: #ff6b61;
      --rose: #ed5b90;
      --pink: #f06492;
      --blush: #ffd7dc;
      --cream: #fff8f5;
      --ink: #272126;
      --muted: rgba(255, 255, 255, 0.82);
      --connect: #ffffff;
      --connect-deep: #fff2ef;
      --disconnect: #202026;
      --disconnect-deep: #121216;
      --shadow: rgba(140, 28, 73, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      min-height: 100svh;
      margin: 0;
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(circle at 24% 28%, rgba(255, 255, 255, 0.18), transparent 18%),
        radial-gradient(circle at 84% 18%, rgba(255, 220, 150, 0.20), transparent 23%),
        linear-gradient(135deg, var(--coral) 0%, var(--pink) 46%, var(--rose) 100%);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--cream);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(120deg, rgba(255, 255, 255, 0.16), transparent 34%),
        radial-gradient(circle at 12% 72%, rgba(255, 255, 255, 0.13), transparent 20%);
      opacity: 0.72;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 18% 26%, rgba(255, 255, 255, 0.24) 0 2px, transparent 3px),
        radial-gradient(circle at 72% 18%, rgba(255, 255, 255, 0.18) 0 2px, transparent 3px),
        radial-gradient(circle at 82% 74%, rgba(255, 255, 255, 0.18) 0 2px, transparent 3px);
      background-size: 120px 120px, 150px 150px, 180px 180px;
      pointer-events: none;
    }

    .shell {
      width: min(92vw, 720px);
      position: relative;
      z-index: 1;
    }

    .card {
      min-height: min(84vh, 650px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(26px, 6vw, 58px);
      border-radius: 8px;
      text-align: center;
    }

    .status {
      width: 46px;
      height: 46px;
      display: inline-grid;
      place-items: center;
      margin: 0 0 34px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.42);
      box-shadow: 0 18px 40px rgba(137, 36, 81, 0.22);
    }

    .pulse {
      width: 17px;
      height: 17px;
      border-radius: 999px;
      background: #fff;
      box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.45);
      animation: pulse 1.6s ease-out infinite;
    }

    .brand {
      position: absolute;
      left: 50%;
      top: clamp(22px, 5vw, 48px);
      transform: translateX(-50%);
      color: #fff;
      font-size: 12px;
      font-weight: 900;
      line-height: 0.95;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .brand span {
      display: inline-block;
      margin-left: 4px;
      font-size: 13px;
    }

    .copy {
      width: 100%;
      max-width: 620px;
      padding-top: 34px;
      transition: opacity 260ms ease, transform 260ms ease;
    }

    h1 {
      margin: 0;
      max-width: 620px;
      color: #fff;
      font-size: clamp(38px, 7vw, 76px);
      font-weight: 900;
      line-height: 0.92;
      letter-spacing: 0;
      text-transform: uppercase;
      overflow-wrap: normal;
      word-break: keep-all;
    }

    h1 span {
      display: block;
    }

    h1 .heart {
      display: inline-block;
      margin-left: 12px;
      color: #fff;
      text-shadow: 0 10px 28px rgba(112, 22, 54, 0.24);
    }

    p {
      max-width: 500px;
      margin: 24px 0 0;
      margin-inline: auto;
      color: var(--muted);
      font-size: clamp(16px, 2vw, 20px);
      line-height: 1.5;
    }

    .actions {
      position: relative;
      width: min(100%, 430px);
      min-height: 92px;
      margin-top: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-inline: auto;
    }

    button {
      width: 188px;
      min-height: 54px;
      padding: 0 20px;
      border: 0;
      border-radius: 999px;
      color: var(--ink);
      font: 800 16px/1 Inter, ui-sans-serif, system-ui, sans-serif;
      letter-spacing: 0;
      cursor: pointer;
      transition: transform 180ms ease, box-shadow 180ms ease, filter 180ms ease;
      box-shadow: 0 16px 36px rgba(142, 28, 72, 0.24);
    }

    button:focus-visible {
      outline: 3px solid rgba(255, 255, 255, 0.72);
      outline-offset: 4px;
    }

    .connect {
      position: absolute;
      left: 18px;
      top: 15px;
      background: linear-gradient(180deg, var(--connect), var(--connect-deep));
      color: #ef5e83;
    }

    .connect:hover {
      transform: translateY(-3px) scale(1.03);
      filter: saturate(1.08);
      box-shadow: 0 20px 42px rgba(255, 255, 255, 0.24);
    }

    .disconnect {
      position: absolute;
      left: 224px;
      top: 15px;
      background: linear-gradient(180deg, var(--disconnect), var(--disconnect-deep));
      color: #fff;
      pointer-events: none;
      transition:
        left 520ms cubic-bezier(0.22, 1, 0.36, 1),
        top 520ms cubic-bezier(0.22, 1, 0.36, 1),
        transform 520ms cubic-bezier(0.22, 1, 0.36, 1),
        opacity 260ms ease;
      will-change: transform, left, top;
    }

    .result {
      min-height: 28px;
      margin-top: 12px;
      color: #fff;
      font-size: 18px;
      font-weight: 800;
      text-align: center;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 220ms ease, transform 220ms ease;
    }

    .result.show {
      opacity: 1;
      transform: translateY(0);
    }

    .success {
      display: none;
      width: 100%;
      max-width: 640px;
      padding-top: 34px;
      text-align: center;
      opacity: 0;
      transform: translateY(14px) scale(0.98);
    }

    .success-illustration {
      position: relative;
      width: clamp(170px, 30vw, 250px);
      height: clamp(170px, 30vw, 250px);
      margin: 0 auto 30px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 48%, rgba(255, 255, 255, 0.98) 0 18%, transparent 19%),
        radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.20) 0 49%, transparent 50%),
        linear-gradient(145deg, rgba(255, 255, 255, 0.28), rgba(255, 255, 255, 0.08));
      border: 1px solid rgba(255, 255, 255, 0.38);
      box-shadow: 0 30px 70px rgba(132, 24, 70, 0.24);
      animation: successPop 520ms cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .success-illustration::before,
    .success-illustration::after {
      content: "";
      position: absolute;
      top: 50%;
      width: 48%;
      height: 4px;
      background: rgba(255, 255, 255, 0.82);
      transform-origin: center;
    }

    .success-illustration::before {
      left: 10%;
      transform: rotate(28deg);
    }

    .success-illustration::after {
      right: 10%;
      transform: rotate(-28deg);
    }

    .success-heart {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -48%);
      color: #ef5e83;
      font-size: clamp(72px, 12vw, 108px);
      line-height: 1;
      text-shadow: 0 12px 26px rgba(153, 34, 80, 0.18);
      animation: heartbeat 1.6s ease-in-out infinite;
    }

    .success h2 {
      margin: 0;
      color: #fff;
      font-size: clamp(36px, 6vw, 70px);
      font-weight: 900;
      line-height: 0.96;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .success p {
      max-width: 540px;
      margin-top: 22px;
      color: rgba(255, 255, 255, 0.88);
    }

    .connected .copy {
      display: none;
    }

    .connected .success {
      display: block;
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    @keyframes pulse {
      100% {
        box-shadow: 0 0 0 22px rgba(255, 255, 255, 0);
      }
    }

    .hearts {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .hearts span {
      position: absolute;
      color: rgba(255, 255, 255, 0.24);
      font-weight: 900;
      line-height: 1;
      filter: drop-shadow(0 16px 24px rgba(135, 28, 72, 0.14));
      animation: floatHeart 8s ease-in-out infinite;
    }

    .hearts span:nth-child(1) {
      left: 9%;
      top: 20%;
      font-size: 54px;
    }

    .hearts span:nth-child(2) {
      right: 11%;
      top: 18%;
      font-size: 84px;
      animation-delay: -2s;
    }

    .hearts span:nth-child(3) {
      left: 15%;
      bottom: 13%;
      font-size: 92px;
      animation-delay: -4s;
    }

    .hearts span:nth-child(4) {
      right: 17%;
      bottom: 16%;
      font-size: 58px;
      animation-delay: -1s;
    }

    .hearts span:nth-child(5) {
      left: 50%;
      top: 8%;
      font-size: 34px;
      animation-delay: -5s;
    }

    @keyframes floatHeart {
      0%, 100% {
        transform: translate3d(0, 0, 0) rotate(-8deg);
      }

      50% {
        transform: translate3d(0, -18px, 0) rotate(8deg);
      }
    }

    @keyframes heartbeat {
      0%, 100% {
        transform: translate(-50%, -48%) scale(1);
      }

      35% {
        transform: translate(-50%, -48%) scale(1.08);
      }

      55% {
        transform: translate(-50%, -48%) scale(0.98);
      }
    }

    @keyframes successPop {
      0% {
        transform: translateY(12px) scale(0.9);
        opacity: 0;
      }

      100% {
        transform: translateY(0) scale(1);
        opacity: 1;
      }
    }

    @media (max-width: 560px) {
      body {
        overflow: auto;
        place-items: start center;
      }

      body::after {
        background-size: 86px 86px, 112px 112px, 140px 140px;
      }

      .shell {
        width: min(100%, 430px);
      }

      .card {
        min-height: 100vh;
        min-height: 100svh;
        justify-content: center;
        padding: 84px 22px 34px;
      }

      .brand {
        top: 24px;
        font-size: 11px;
      }

      .status {
        width: 42px;
        height: 42px;
        margin-bottom: 24px;
      }

      .pulse {
        width: 15px;
        height: 15px;
      }

      .copy {
        max-width: 360px;
        padding-top: 0;
      }

      h1 {
        max-width: 360px;
        font-size: clamp(32px, 10.5vw, 48px);
        line-height: 0.95;
      }

      h1 .heart {
        display: block;
        margin: 12px 0 0;
        font-size: 0.86em;
      }

      p {
        max-width: 320px;
        margin-top: 20px;
        font-size: 16px;
        line-height: 1.45;
      }

      .actions {
        min-height: 152px;
        width: min(100%, 320px);
        margin-top: 30px;
      }

      button {
        width: min(100%, 260px);
        min-height: 52px;
        font-size: 15px;
      }

      .connect {
        left: 50%;
        top: 8px;
        transform: translateX(-50%);
      }

      .connect:hover {
        transform: translateX(-50%) translateY(-3px) scale(1.03);
      }

      .disconnect {
        left: 50%;
        top: 86px;
        transform: translateX(-50%);
      }

      .result {
        margin-top: 4px;
        font-size: 16px;
      }

      .success {
        max-width: 360px;
        padding-top: 0;
      }

      .success-illustration {
        width: 162px;
        height: 162px;
        margin-bottom: 24px;
      }

      .success-heart {
        font-size: 72px;
      }

      .success h2 {
        font-size: clamp(34px, 11vw, 48px);
        line-height: 1;
      }

      .success p {
        max-width: 330px;
        margin-top: 18px;
        font-size: 16px;
      }

      .hearts span:nth-child(1) {
        left: 5%;
        top: 18%;
        font-size: 34px;
      }

      .hearts span:nth-child(2) {
        right: 4%;
        top: 13%;
        font-size: 48px;
      }

      .hearts span:nth-child(3) {
        left: 2%;
        bottom: 9%;
        font-size: 54px;
      }

      .hearts span:nth-child(4) {
        right: 7%;
        bottom: 10%;
        font-size: 36px;
      }

      .hearts span:nth-child(5) {
        display: none;
      }
    }

    @media (max-width: 380px) {
      .card {
        padding-inline: 18px;
      }

      h1 {
        font-size: clamp(28px, 9.8vw, 36px);
      }

      p,
      .success p {
        font-size: 15px;
      }

      .actions {
        width: min(100%, 288px);
      }

      button {
        width: 238px;
      }

      .success-illustration {
        width: 140px;
        height: 140px;
      }

      .success-heart {
        font-size: 62px;
      }
    }

    @media (min-width: 561px) and (max-width: 860px) {
      body {
        overflow: auto;
      }

      .card {
        min-height: 100vh;
        min-height: 100svh;
        padding-top: 90px;
      }
    }
  </style>
</head>
<body>
  <div class="hearts" aria-hidden="true">
    <span>♥</span>
    <span>♥</span>
    <span>♥</span>
    <span>♥</span>
    <span>♥</span>
  </div>

  <main class="shell">
    <section class="card" aria-labelledby="question">
      <div class="brand">Romantic<br>Connect <span>♥</span></div>

      <div class="copy">
        <div class="status" aria-hidden="true">
          <span class="pulse"></span>
        </div>

        <h1 id="question">
          <span>У нас</span>
          <span>коннект</span>
          <span>или</span>
          <span>дисконнект?</span>
          <span class="heart">♥</span>
        </h1>
        <p>Один маленький выбор, который может сделать вечер теплее, а настроение нежнее.</p>

        <div class="actions" id="playground">
          <button class="connect" id="connectBtn" type="button">Коннект</button>
          <button class="disconnect" id="disconnectBtn" type="button">Дисконнект</button>
        </div>

        <div class="result" id="result" role="status" aria-live="polite"></div>
      </div>

      <div class="success" id="successView" aria-live="polite">
        <div class="success-illustration" aria-hidden="true">
          <span class="success-heart">♥</span>
        </div>
        <h2>Ура, коннект установлен!</h2>
        <p>Теперь связь подтверждена: вечер становится теплее, улыбка ближе, а настроение явно выбирает нас двоих.</p>
      </div>

    </section>
  </main>

  <script>
    const playground = document.querySelector("#playground");
    const disconnectBtn = document.querySelector("#disconnectBtn");
    const connectBtn = document.querySelector("#connectBtn");
    const result = document.querySelector("#result");
    let lastMoveAt = 0;
    let cursor = { x: 0, y: 0 };
    let cursorIsInsidePlayground = false;

    function rectanglesOverlap(a, b, gap = 14) {
      return !(
        a.left + a.width + gap < b.left ||
        b.left + b.width + gap < a.left ||
        a.top + a.height + gap < b.top ||
        b.top + b.height + gap < a.top
      );
    }

    function moveDisconnectButton(force = false) {
      const now = Date.now();

      if (!force && now - lastMoveAt < 120) {
        return;
      }

      lastMoveAt = now;

      const area = playground.getBoundingClientRect();
      const button = disconnectBtn.getBoundingClientRect();
      const padding = 10;
      const maxLeft = Math.max(padding, area.width - button.width - padding);
      const maxTop = Math.max(padding, area.height - button.height - padding);
      const connect = connectBtn.getBoundingClientRect();
      const connectBox = {
        left: connect.left - area.left,
        top: connect.top - area.top,
        width: connect.width,
        height: connect.height
      };
      const candidates = Array.from({ length: 18 }, () => {
        const left = Math.random() * maxLeft;
        const top = Math.random() * maxTop;
        const box = { left, top, width: button.width, height: button.height };
        const centerX = left + button.width / 2;
        const centerY = top + button.height / 2;
        const distance = Math.hypot(centerX - cursor.x, centerY - cursor.y);
        const overlapsConnect = rectanglesOverlap(box, connectBox);
        const cursorInside =
          cursor.x >= left - 22 &&
          cursor.x <= left + button.width + 22 &&
          cursor.y >= top - 22 &&
          cursor.y <= top + button.height + 22;

        return {
          left,
          top,
          score: distance - (overlapsConnect ? 1000 : 0) - (cursorInside ? 1000 : 0)
        };
      });
      const safest = candidates.sort((a, b) => b.score - a.score)[0];

      disconnectBtn.style.left = `${safest.left}px`;
      disconnectBtn.style.top = `${safest.top}px`;
      disconnectBtn.style.transform = `rotate(${Math.random() * 14 - 7}deg)`;
    }

    function keepAwayFromCursor(event) {
      const area = playground.getBoundingClientRect();
      const button = disconnectBtn.getBoundingClientRect();
      cursorIsInsidePlayground = true;
      cursor = {
        x: event.clientX - area.left,
        y: event.clientY - area.top
      };

      const buttonCenterX = button.left - area.left + button.width / 2;
      const buttonCenterY = button.top - area.top + button.height / 2;
      const distance = Math.hypot(cursor.x - buttonCenterX, cursor.y - buttonCenterY);
      const cursorIsOnButton =
        event.clientX >= button.left &&
        event.clientX <= button.right &&
        event.clientY >= button.top &&
        event.clientY <= button.bottom;

      if (cursorIsOnButton || distance < 120) {
        moveDisconnectButton(cursorIsOnButton);
      }
    }

    playground.addEventListener("pointermove", keepAwayFromCursor);
    playground.addEventListener("pointerleave", () => {
      cursorIsInsidePlayground = false;
    });
    playground.addEventListener("touchstart", (event) => {
      if (connectBtn.contains(event.target)) {
        return;
      }

      const touch = event.touches[0];
      const area = playground.getBoundingClientRect();
      const button = disconnectBtn.getBoundingClientRect();
      cursor = {
        x: touch.clientX - area.left,
        y: touch.clientY - area.top
      };

      const buttonCenterX = button.left - area.left + button.width / 2;
      const buttonCenterY = button.top - area.top + button.height / 2;
      const distance = Math.hypot(cursor.x - buttonCenterX, cursor.y - buttonCenterY);

      if (distance < 120) {
        event.preventDefault();
        moveDisconnectButton(true);
      }
    });

    setInterval(() => {
      if (!cursorIsInsidePlayground) {
        return;
      }

      const area = playground.getBoundingClientRect();
      const button = disconnectBtn.getBoundingClientRect();
      const currentBox = {
        left: button.left - area.left,
        top: button.top - area.top,
        right: button.right - area.left,
        bottom: button.bottom - area.top
      };

      const cursorIsOnButton =
        cursor.x >= currentBox.left - 8 &&
        cursor.x <= currentBox.right + 8 &&
        cursor.y >= currentBox.top - 8 &&
        cursor.y <= currentBox.bottom + 8;

      if (cursorIsOnButton) {
        moveDisconnectButton(true);
      }
    }, 90);

    disconnectBtn.addEventListener("click", (event) => {
      event.preventDefault();
      moveDisconnectButton(true);
    });

    connectBtn.addEventListener("click", () => {
      document.querySelector(".card").classList.add("connected");
    });
  </script>
</body>
</html>
